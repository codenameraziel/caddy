 # -------------------------------
  # Proxy Reverso (Caddy com Tailscale)
  # -------------------------------
  caddy:
    image: caddy:latest
    container_name: janus-caddy
    restart: unless-stopped
    ports:
      - "443:443"       # Porta HTTPS padrão
      - "443:443/udp"   # Necessário para HTTP/3 (QUIC)
    volumes:
      - ./caddy:/etc/caddy   
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - janus
      - web
    networks:
      - internal_net
