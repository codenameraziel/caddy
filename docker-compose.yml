services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped   # garante reinicio automatico
    ports:
      - "8880:80"          # HTTP externo na porta 8880
      - "443:443"          # HTTPS externo na porta 443
      - "443:443/udp"      # QUIC/HTTP3
    volumes:
      - ./caddy:/etc/caddy        # Caddyfile e configs
      - caddy_data:/data          # dados persistentes (certificados, etc.)
      - caddy_config:/config      # configs internas
      - /var/run/tailscale:/var/run/tailscale  # socket do tailscaled
    networks:
      - internal_net
      - umbrel_main_network       # rede externa correta do Umbrel

networks:
  internal_net:
    driver: bridge
    external: true   # ja existe no host

volumes:
  caddy_data:
  caddy_config:
