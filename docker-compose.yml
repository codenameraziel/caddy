version: "3.9"

services:
  tailscale:
    build: ./tailscale
    container_name: tailscale
    restart: always
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun
    volumes:
      - tailscale-data:/var/lib/tailscale
      - /var/run/tailscale:/var/run/tailscale
    command: tailscaled --state=/var/lib/tailscale/tailscaled.state --socket=/var/run/tailscale/tailscaled.sock

  caddy:
    build: ./caddy
    container_name: caddy
    restart: always
    network_mode: "host"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - /var/run/tailscale:/var/run/tailscale:ro
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile   # <-- aqui está o bind com letra minúscula

volumes:
  caddy_data:
  caddy_config:
  tailscale-data:
