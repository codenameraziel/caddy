version: "3.9"

services:
  tailscale:
    build: ./tailscale
    container_name: tailscale
    restart: always
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun
    volumes:
      - tailscale-data:/var/lib/tailscale
      - /var/run/tailscale:/var/run/tailscale
    command: tailscaled

  caddy:
    build: ./caddy
    container_name: caddy
    restart: always
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - /var/run/tailscale:/var/run/tailscale:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - internal_net

networks:
  internal_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  tailscale-data:
