version: "3.9"

services:
  caddy:
    build: ./caddy
    container_name: caddy
    restart: always
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    networks:
      - internal_net
networks:
  internal_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
