version: "3.8"

services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "8880:80"          # HTTP externo na porta 8880
      - "443:443"          # HTTPS externo na porta 443
      - "443:443/udp"      # QUIC/HTTP3
    volumes:
      - ./caddy:/etc/caddy        # Caddyfile e configs
      - caddy_data:/data          # dados persistentes (certificados, etc.)
      - caddy_config:/config      # configs internas
      - /var/run/tailscale:/var/run/tailscale  # monta o socket do tailscaled
    networks:
      - internal_net

networks:
  internal_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
