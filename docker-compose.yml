version: "3.8"

services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"          # Porta necessaria para validaçăo ACME/Let's Encrypt
      - "443:443"        # HTTPS
      - "443:443/udp"    # HTTP/3 (QUIC)
    volumes:
      - ./caddy:/etc/caddy       # Pasta com o Caddyfile
      - caddy_data:/data         # Certificados e cache
      - caddy_config:/config     # Configuraçăo interna binaria
    networks:
      - internal_net

networks:
  internal_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
